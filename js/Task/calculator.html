<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- <textarea name="" id="txtarea" cols="20" rows="2"></textarea> -->
     <input type="text" id="txtin">
    <button onclick="bt('0')">0</button>
    <button onclick="bt('1')">1</button>
    <button onclick="bt('2')">2</button>
    <button onclick="bt('3')">3</button>
    <button onclick="bt('4')">4</button>
    <button onclick="bt('5')">5</button>
    <button onclick="bt('6')">6</button>
    <button onclick="bt('7')">7</button>
    <button onclick="bt('8')">8</button>
    <button onclick="bt('9')">9</button>
    <button onclick="bt('.')">.</button>
    <button onclick="bt('+')">+</button>
    <button onclick="bt('-')">-</button>
    <button onclick="bt('*')">*</button>
    <button onclick="bt('/')">/</button>
    <button onclick="cal()">=</button>
    <button onclick="clr()">C</button>
    
    <script>
        function bt(input){
            txtin.value += input
        }
        function cal() {
            txtin.value = eval(txtin.value);
        }
        function clr(){
            txtin.value = ""
        }
    </script>

</body>
</html>
