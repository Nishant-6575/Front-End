<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .card{
            width: 25%;
            margin: 100px auto;
            text-align: center;
            border: 2px solid rgb(168, 20, 20);
            border-radius: 25px;
            padding-bottom: 20px;
        }
        .name{
            padding: 10px;
        }
        .btn{
            width: 50%;
            background-color: rgb(41, 36, 182);
            color: white;
            border: none;
            border-radius: 20px;
            box-shadow: 5px 5px 3px rgba(157, 157, 157, 0.722);
            margin-top: 5px;
        }

        .c-bx{
            height: 200px;
            width: 200px;
            border: 5px solid black;
            margin: 10px auto;
            padding: 10px;
        }
        .b-bx{
            height: 200px;
            width: 200px;
            border: 5px solid black;
            margin: 10px auto;
            box-sizing: border-box;
            padding: 10px;
        }


    </style>
</head>
<body>
    <div class="card">
        <div class="img"><img src="/html/Assignment/CSS-and-CSS3/Profile.png" alt="No Image"></div>
        <div class="info">
            <div class="name">Nishant</div>
            <div class="bio">Information about person</div>
        </div>
        <button class="btn">Follow</button>
    </div>

    <div class="c-bx">Content with 200px width (Content-box)</div>
    <br>
    <div class="b-bx">content with 200px width (Border-box)</div>
</body>
</html>
