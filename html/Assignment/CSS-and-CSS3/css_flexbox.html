<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .hd {
            border: 2px solid black;
            text-align: center;
            margin: 10px 0px;
        }

        .main {
            display: flex;
            margin: 10px 0px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content {
            border: 2px solid black;
            text-align: center;
            width: 50%;
            height: 200px;
        }

        .sidebar {
            width: 50%;
            border: 2px solid black;
            text-align: center;
            align-content: center;
        }

        .foot {
            border: 2px solid black;
            text-align: center;
            margin: 10px 0px;
        }

        @media only screen and (max-width:768px) {
            .main {
                display: block;
            }

            .content {
                width: 100%;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="hd">
        <h1>This is Header</h1>
    </header>

    <div class="main">
        <aside class="sidebar">This is sidebar</aside>
        <div class="content">Here is content</div>

    </div>

    <footer class="foot">This is Footer</footer>
</body>

</html>
