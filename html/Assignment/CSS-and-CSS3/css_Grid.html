        .img{

        }
        img{

            border-radius: 15px;
        }
        h3{

        }
        p{
            font-size: clamp(12px,  1.8vw, 22px);
            margin-top: 5px;
        }
        .card:hover{
            scale: 1.1;
            transition: 0.5s;
            box-shadow: 0px 0px 4px 3px rgba(0, 0, 0, 0.529);
        }
